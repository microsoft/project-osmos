name: Bump plugin version

on:
  issue_comment:
    types: [created]

permissions:
  actions: write
  contents: write
  issues: write

concurrency:
  group: bump-plugin-version
  cancel-in-progress: false

jobs:
  bump:
    if: >-
      github.event.issue.pull_request == null &&
      (
        contains(github.event.issue.labels.*.name, 'bump-plugin-version') ||
        startsWith(github.event.issue.title, '[bump-plugin-version]') ||
        startsWith(github.event.issue.title, 'Bump Plugin Version')
      )
    runs-on: ubuntu-latest
    steps:
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Checkout approval policy
        uses: actions/checkout@v4
        with:
          ref: main

      - name: Check bump approval
        id: approval
        env:
          COMMENT_BODY: ${{ github.event.comment.body }}
          COMMENT_AUTHOR: ${{ github.event.comment.user.login }}
          ISSUE_TITLE: ${{ github.event.issue.title }}
          ISSUE_LABELS_JSON: ${{ toJson(github.event.issue.labels.*.name) }}
          ISSUE_BODY_JSON: ${{ toJson(github.event.issue.body) }}
          GH_TOKEN: ${{ github.token }}
          REPOSITORY: ${{ github.repository }}
        run: |
          python - <<'PY'
          import json
          import os
          import re
          import urllib.error
          import urllib.request
          from pathlib import Path

          ALLOWED_BUMPS = {"major", "minor", "patch"}
          REQUIRED_REPOSITORY_PERMISSION = {"admin", "maintain"}
          REQUIRED_ACL_ROLE = {"admin", "maintain"}

          def collaborator_permission(user: str) -> str:
              if not user:
                  return "none"
              request = urllib.request.Request(
                  f"https://api.github.com/repos/{os.environ['REPOSITORY']}/collaborators/{user}/permission",
                  headers={
                      "Accept": "application/vnd.github+json",
                      "Authorization": f"Bearer {os.environ['GH_TOKEN']}",
                      "X-GitHub-Api-Version": "2022-11-28",
                  },
              )
              try:
                  with urllib.request.urlopen(request, timeout=30) as response:
                      return json.loads(response.read().decode("utf-8")).get("permission", "none")
              except urllib.error.HTTPError as error:
                  if error.code not in {403, 404}:
                      raise
              return "none"

          def login_candidates(user: str) -> set[str]:
              login = user.lower()
              candidates = {login}
              hosted_suffix = "_" + "microsoft"
              if login.endswith(hosted_suffix):
                  candidates.add(login.removesuffix(hosted_suffix))
              return candidates

          def acl_roles(user: str) -> tuple[set[str], bool]:
              acl_path = Path(".github") / "acl" / "access.yml"
              acl_present = acl_path.is_file()
              if not user or not acl_present:
                  return set(), acl_present

              def yaml_scalar(raw_value: str) -> str:
                  return raw_value.split("#", 1)[0].strip().strip("'\"").lower()

              candidates = login_candidates(user)
              roles = set()
              current_member = None
              for line in acl_path.read_text(encoding="utf-8").splitlines():
                  stripped = line.strip()
                  if stripped.startswith("- member:"):
                      current_member = yaml_scalar(stripped.split(":", 1)[1])
                      continue
                  if current_member and stripped.startswith("role:"):
                      role = yaml_scalar(stripped.split(":", 1)[1])
                      if current_member in candidates:
                          roles.add(role)
                      current_member = None
              return roles, acl_present

          def role_list(roles: set[str]) -> str:
              return ",".join(sorted(roles)) if roles else "none"

          def authorization(user: str) -> tuple[bool, str, set[str], bool, str]:
              roles, acl_present = acl_roles(user)
              if acl_present:
                  allowed = bool(roles & REQUIRED_ACL_ROLE)
                  reason = (
                      "commenter is not listed as an ACL Maintain approver "
                      f"(acl_roles={role_list(roles)})"
                  )
                  return allowed, "not_checked", roles, acl_present, reason

              permission = collaborator_permission(user)
              allowed = permission in REQUIRED_REPOSITORY_PERMISSION
              reason = (
                  "ACL file is unavailable and commenter does not have GitHub admin/maintain permission "
                  f"(permission={permission})"
              )
              return allowed, permission, roles, acl_present, reason

          def issue_form_value(body: str, label: str) -> str:
              for match in re.finditer(r"^### (?P<label>.+?)\s*\n(?P<value>.*?)(?=\n### |\Z)", body, re.M | re.S):
                  if match.group("label").strip() != label:
                      continue
                  lines = [line.strip() for line in match.group("value").splitlines() if line.strip()]
                  return lines[0].lower() if lines else ""
              return ""

          labels = json.loads(os.environ.get("ISSUE_LABELS_JSON") or "[]")
          title = os.environ.get("ISSUE_TITLE", "")
          body = json.loads(os.environ.get("ISSUE_BODY_JSON") or '""') or ""
          comment_body = os.environ.get("COMMENT_BODY", "")
          comment_author = os.environ.get("COMMENT_AUTHOR", "")

          is_bump_issue = (
              "bump-plugin-version" in labels
              or title.startswith("[bump-plugin-version]")
              or title.startswith("Bump Plugin Version")
          )
          has_approval_comment = comment_body.strip().casefold() == "approved"
          bump = issue_form_value(body, "Version bump type")
          if is_bump_issue and has_approval_comment:
              is_authorized, permission, roles, acl_present, authorization_reason = authorization(comment_author)
          else:
              is_authorized, permission, roles, acl_present, authorization_reason = False, "none", set(), False, ""

          if not is_bump_issue:
              approved = False
              reason = "issue is not a plugin version bump request"
          elif not has_approval_comment:
              approved = False
              reason = 'comment body is not "approved" (case-insensitive)'
          elif not is_authorized:
              approved = False
              reason = authorization_reason
          elif bump not in ALLOWED_BUMPS:
              approved = False
              reason = f"version bump type must be one of major, minor, or patch (found {bump or 'none'})"
          else:
              approved = True
              reason = "trusted approval comment"

          with Path(os.environ["GITHUB_OUTPUT"]).open("a", encoding="utf-8") as handle:
              handle.write(f"approved={'true' if approved else 'false'}\n")
              handle.write(f"approval_attempt={'true' if has_approval_comment else 'false'}\n")
              handle.write(f"reason={reason}\n")
              handle.write(f"bump={bump}\n")
          PY

      - name: Comment on rejected bump approval
        if: steps.approval.outputs.approval_attempt == 'true' && steps.approval.outputs.approved != 'true'
        env:
          GH_TOKEN: ${{ github.token }}
          REJECTION_REASON: ${{ steps.approval.outputs.reason }}
        run: |
          body_file="$RUNNER_TEMP/rejected-bump-approval.md"
          printf 'Plugin version bump was not started: %s\n' "$REJECTION_REASON" > "$body_file"
          gh issue comment "${{ github.event.issue.number }}" \
            --repo "${{ github.repository }}" \
            --body-file "$body_file"

      - name: Stop if bump is not approved
        if: steps.approval.outputs.approval_attempt == 'true' && steps.approval.outputs.approved != 'true'
        env:
          REJECTION_REASON: ${{ steps.approval.outputs.reason }}
        run: |
          printf 'Plugin version bump is not approved: %s\n' "$REJECTION_REASON" >&2
          exit 1

      - name: Checkout main
        if: steps.approval.outputs.approved == 'true'
        uses: actions/checkout@v4
        with:
          ref: main
          fetch-depth: 0

      - name: Bump marketplace versions
        if: steps.approval.outputs.approved == 'true'
        id: bump
        env:
          BUMP: ${{ steps.approval.outputs.bump }}
        run: |
          git fetch --no-tags origin main
          git checkout -B main origin/main
          python - <<'PY'
          import json
          import os
          import re
          from pathlib import Path

          marketplace_path = Path(".github/plugin/marketplace.json")
          marketplace = json.loads(marketplace_path.read_text(encoding="utf-8"))
          plugins = marketplace.get("plugins", [])
          if len(plugins) != 1:
              raise SystemExit("Expected exactly one plugin entry")

          current_version = marketplace.get("metadata", {}).get("version")
          if not isinstance(current_version, str) or not re.fullmatch(r"(0|[1-9]\d*)\.(0|[1-9]\d*)\.(0|[1-9]\d*)", current_version):
              raise SystemExit("metadata.version must use MAJOR.MINOR.PATCH semver")
          if plugins[0].get("version") != current_version:
              raise SystemExit("metadata.version must match plugin entry version before bumping")

          major, minor, patch = map(int, current_version.split("."))
          bump = os.environ["BUMP"]
          if bump == "major":
              major += 1
              minor = 0
              patch = 0
          elif bump == "minor":
              minor += 1
              patch = 0
          elif bump == "patch":
              patch += 1
          else:
              raise SystemExit(f"Unknown bump: {bump}")

          new_version = f"{major}.{minor}.{patch}"
          marketplace.setdefault("metadata", {})["version"] = new_version
          plugins[0]["version"] = new_version
          marketplace_path.write_text(json.dumps(marketplace, indent=2) + "\n", encoding="utf-8")

          output_path = Path(os.environ["GITHUB_OUTPUT"])
          with output_path.open("a", encoding="utf-8") as handle:
              handle.write(f"previous_version={current_version}\n")
              handle.write(f"version={new_version}\n")
          PY

      - name: Validate marketplace manifests
        if: steps.approval.outputs.approved == 'true'
        run: python build/validate_plugin.py

      - name: Validate version increment
        if: steps.approval.outputs.approved == 'true'
        run: python build/check_version_bump.py --base-ref HEAD

      - name: Push version bump to main
        if: steps.approval.outputs.approved == 'true'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add .github/plugin/marketplace.json .claude-plugin/marketplace.json
          git commit \
            -m "Bump plugin version to ${{ steps.bump.outputs.version }}" \
            -m "Co-authored-by: Copilot <223556219+Copilot@users.noreply.github.com>"
          git push origin HEAD:main
          echo "COMMIT_SHA=$(git rev-parse HEAD)" >> "$GITHUB_ENV"

      - name: Dispatch follow-up workflows
        if: steps.approval.outputs.approved == 'true'
        env:
          GH_TOKEN: ${{ github.token }}
        run: gh workflow run release-plugin.yml --ref main

      - name: Comment on bump issue
        if: steps.approval.outputs.approved == 'true'
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          body_file="$RUNNER_TEMP/bump-plugin-version-comment.md"
          cat >"$body_file" <<BODY
          Plugin version bump approved and applied.

          New version: \`${{ steps.bump.outputs.version }}\`
          Previous version: \`${{ steps.bump.outputs.previous_version }}\`
          Commit: ${{ github.server_url }}/${{ github.repository }}/commit/${COMMIT_SHA}

          The release workflow was dispatched and will dispatch public sync after verifying the package release.
          BODY
          gh issue comment "${{ github.event.issue.number }}" \
            --repo "${{ github.repository }}" \
            --body-file "$body_file"
