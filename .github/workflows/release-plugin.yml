name: Release plugin

on:
  push:
    branches: [main]
    paths:
      - ".github/plugin/marketplace.json"
  workflow_dispatch:

concurrency:
  group: release-plugin-main
  cancel-in-progress: false

permissions:
  contents: write

jobs:
  release:
    if: github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Validate marketplace manifests
        run: python build/validate_plugin.py

      - name: Read marketplace version
        id: version
        run: |
          VERSION=$(python - <<'PY'
          import json

          with open(".github/plugin/marketplace.json", encoding="utf-8") as handle:
              marketplace = json.load(handle)
          print(marketplace["metadata"]["version"])
          PY
          )
          echo "version=${VERSION}" >> "$GITHUB_OUTPUT"
          echo "tag=v${VERSION}" >> "$GITHUB_OUTPUT"

      - name: Check whether release exists
        id: release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          if gh release view "${{ steps.version.outputs.tag }}" >/dev/null 2>&1; then
            echo "exists=true" >> "$GITHUB_OUTPUT"
          else
            echo "exists=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Create GitHub release
        if: steps.release.outputs.exists == 'false'
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release create "${{ steps.version.outputs.tag }}" \
            --title "${{ steps.version.outputs.tag }}" \
            --notes "Project Osmos plugin ${{ steps.version.outputs.version }}" \
            --target "$GITHUB_SHA"
